<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Drip Society</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#000;--white:#fff;--gray:#888;--border:#1a1a1a;
  --s1:#0d0d0d;--s2:#111;--gold:#c9a84c;--danger:#ff3b30;
  --font-h:'Montserrat',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--black);color:var(--white);font-family:var(--font-h);font-size:14px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
#header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:60px;background:var(--black);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-size:16px;font-weight:900;letter-spacing:4px;text-transform:uppercase;}
.logo span{color:var(--gold);}
.hr{display:flex;gap:12px;}
.ibtn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:none;cursor:pointer;}
#cbadge{position:absolute;top:-5px;right:-5px;background:var(--gold);color:var(--black);font-size:9px;font-weight:900;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;border:2px solid var(--black);}

/* ── HERO ── */
#hero{padding:40px 20px;border-bottom:1px solid var(--border);background: linear-gradient(to bottom, #050505, #000);}
#hero h1{font-size:36px;font-weight:900;line-height:0.9;text-transform:uppercase;margin-bottom:10px;letter-spacing:-1px;}
#hero h1 em{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold);font-size:42px;font-weight:400;}
#hero p{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:2px;opacity:0.8;}

/* ── CATALOG ── */
#catalog{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);padding-bottom:120px;}
.card{background:var(--black);display:flex;flex-direction:column;position:relative;}

/* ── FIX IMAGE : Cadrage parfait ── */
.cimg{
  width:100%;
  aspect-ratio:1 / 1.2; /* Format portrait élégant */
  background:var(--s2);
  overflow:hidden;
  position:relative;
}
.cimg img{
  width:100%;
  height:100%;
  object-fit:cover; /* Recadre et centre l'image automatiquement */
  object-position:center;
  display:block;
  transition: transform 0.5s ease;
}
.card:active .cimg img{transform:scale(1.05);}

.cbody{padding:15px;flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.cname{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px;line-height:1.4;letter-spacing:0.5px;min-height:32px;}
.cprice{color:var(--gold);font-weight:700;font-size:18px;margin-bottom:15px;font-family: 'Cormorant Garamond', serif;}

/* ── TAILLES & BOUTONS ── */
.sz-row{display:flex;gap:6px;margin-bottom:15px;flex-wrap:wrap;}
.sz-btn{
  border:1px solid var(--border);padding:8px;font-size:10px;font-weight:700;
  cursor:pointer;color:var(--gray);background:var(--s1);min-width:38px;text-align:center;
  transition: 0.2s;
}
.sz-btn.active{border-color:var(--white);color:var(--white);background:var(--s2);}

.add-btn{
  width:100%;padding:14px;background:var(--white);color:var(--black);
  border:none;font-weight:900;font-size:10px;text-transform:uppercase;
  letter-spacing:2px;cursor:pointer;transition: 0.2s;
}
.add-btn:disabled{background:var(--s1);color:var(--border);cursor:not-allowed;}
.add-btn:active:not(:disabled){transform:scale(0.96);background:var(--gold);}

/* ── PANIER BARRE BAS ── */
#cart-bar{
  position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.95);
  backdrop-filter: blur(10px);
  border-top:1px solid var(--border);padding:20px;z-index:90;
  transform:translateY(100%);transition:0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
#cart-bar.show{transform:translateY(0);}
#bar-btn{
  width:100%;padding:16px;background:var(--gold);color:var(--black);
  font-weight:900;text-transform:uppercase;border:none;display:flex;
  justify-content:space-between;letter-spacing:1px;
}

/* ── DRAWERS ── */
.dw{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;display:none;padding:25px;}
.dw.show{display:block;overflow-y:auto;animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.fg{margin-bottom:20px;}
.fg label{display:block;font-size:10px;text-transform:uppercase;margin-bottom:8px;color:var(--gray);letter-spacing:1px;}
.fg input,.fg select{width:100%;padding:15px;background:var(--s1);border:1px solid var(--border);color:var(--white);outline:none;border-radius:0;}
.upload-box{border:1px dashed var(--gold);padding:30px;text-align:center;margin-bottom:15px;color:var(--gold);font-size:11px;font-weight:700;}

#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--black);padding:12px 25px;font-weight:900;font-size:11px;z-index:1000;display:none;text-transform:uppercase;letter-spacing:1px;box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
</style>
</head>
<body>

<div id="toast"></div>

<header id="header">
  <div class="logo">DRIP<span>·</span>SOCIETY</div>
  <div class="hr">
    <div class="ibtn" onclick="tryAdmin()">⚙️</div>
    <div class="ibtn" onclick="openCart()" style="position:relative;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
        <div id="cbadge">0</div>
    </div>
  </div>
</header>

<div id="hero">
  <h1>Qualité <em>Supérieure</em><br>Bas Prix</h1>
  <p>Collection Streetwear — Sélection exclusive</p>
</div>

<div id="catalog"></div>

<div id="cart-bar">
  <button id="bar-btn" onclick="openCart()">
    <span id="bar-qty">0 ARTICLES</span>
    <span id="bar-total">0.00 €</span>
  </button>
</div>

<div id="cart-dw" class="dw">
  <h2 style="text-transform:uppercase;letter-spacing:3px;margin-bottom:30px;font-size:24px;">Panier</h2>
  <div id="cart-items" style="margin-bottom:30px;"></div>
  <div style="border-top:1px solid var(--border);padding-top:20px;">
    <div style="display:flex;justify-content:space-between;margin-bottom:30px;align-items:baseline;">
        <span style="font-size:12px;color:var(--gray);">TOTAL</span>
        <span id="cart-total-val" style="color:var(--gold);font-weight:900;font-size:28px;font-family:'Cormorant Garamond',serif;">0.00 €</span>
    </div>
    <button onclick="sendOrder()" style="width:100%;padding:18px;background:var(--gold);border:none;font-weight:900;cursor:pointer;letter-spacing:2px;text-transform:uppercase;">Valider la commande</button>
    <button onclick="closeAll()" style="width:100%;margin-top:20px;background:none;color:var(--gray);border:none;cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:2px;">Continuer les achats</button>
  </div>
</div>

<div id="admin-dw" class="dw">
  <h2 style="text-transform:uppercase;margin-bottom:30px;letter-spacing:2px;">Ajouter un article</h2>
  <div class="fg">
    <label>Visuel du produit</label>
    <div class="upload-box" onclick="document.getElementById('file-input').click()">
        <span id="up-status">📸 PRENDRE OU CHOISIR UNE PHOTO</span>
        <input type="file" id="file-input" style="display:none;" onchange="handleUpload(this)">
    </div>
    <input type="hidden" id="a-img">
  </div>
  <div class="fg"><label>Nom de l'article</label><input type="text" id="a-name" placeholder="Ex: Nike Zoom Vomero..."></div>
  <div class="fg"><label>Prix de vente (€)</label><input type="number" id="a-price" step="0.01" placeholder="49.00"></div>
  <div class="fg">
    <label>Catégorie</label>
    <select id="a-cat">
        <option value="Chaussures">Chaussures</option>
        <option value="T-shirts">T-shirts</option>
        <option value="Sweats">Sweats</option>
        <option value="Pantalons">Pantalons</option>
        <option value="Accessoires">Accessoires</option>
    </select>
  </div>
  <button onclick="saveProduct()" style="width:100%;padding:18px;background:var(--white);color:var(--black);font-weight:900;border:none;text-transform:uppercase;letter-spacing:2px;">Publier sur le shop</button>
  <button onclick="closeAll()" style="width:100%;margin-top:20px;background:none;color:var(--gray);border:none;font-size:11px;letter-spacing:1px;">ANNULER</button>
</div>

<script>
const SUPA = "https://juescdtmfmiqyfqfrwnd.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZXNjZHRtZm1pcXlmcWZyd25kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTQ0OTQsImV4cCI6MjA5MDI3MDQ5NH0.E1SIYG7bEjnBoZhb72QMC-B94e6pl-sGvqsvYgJu3eY";
const IMGBB_KEY = "aa8867d9251f5b7d143686e13436c72d";
const ADMINS = ["8649556290", "1072084263", "8704291005"];

const tg = window.Telegram.WebApp;
tg.expand();

let products = [];
let cart = [];
let selectedSizes = {};

async function load() {
    const res = await fetch(`${SUPA}/rest/v1/products?select=*&order=created_at.desc`, {
        headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
    });
    products = await res.json();
    render();
}

function render() {
    const grid = document.getElementById("catalog");
    grid.innerHTML = products.map(p => {
        const size = selectedSizes[p.id] || "";
        return `
        <div class="card">
            <div class="cimg"><img src="${p.image_url}"></div>
            <div class="cbody">
                <div class="cname">${p.name}</div>
                <div class="cprice">${p.price.toFixed(2)} €</div>
                <div class="sz-row">
                    ${['S','M','L','XL'].map(s => `
                        <div class="sz-btn ${size === s ? 'active' : ''}" onclick="selectSize('${p.id}', '${s}')">${s}</div>
                    `).join('')}
                </div>
                <button class="add-btn" ${!size ? 'disabled' : ''} onclick="addToCart('${p.id}')">
                    ${size ? 'Ajouter au panier' : 'Choisir taille'}
                </button>
            </div>
        </div>`;
    }).join("");
}

function selectSize(pid, size) {
    selectedSizes[pid] = size;
    render();
    tg.HapticFeedback.selectionChanged();
}

function addToCart(pid) {
    const p = products.find(x => x.id == pid);
    const size = selectedSizes[pid];
    cart.push({ ...p, size });
    updateUI();
    showToast(`🛍️ ${p.name} (${size}) ajouté`);
    tg.HapticFeedback.notificationOccurred('success');
}

function updateUI() {
    const total = cart.reduce((acc, item) => acc + item.price, 0);
    document.getElementById("cbadge").textContent = cart.length;
    document.getElementById("cbadge").style.display = cart.length > 0 ? "flex" : "none";
    document.getElementById("bar-qty").textContent = `${cart.length} ARTICLE${cart.length > 1 ? 'S' : ''}`;
    document.getElementById("bar-total").textContent = `${total.toFixed(2)} €`;
    document.getElementById("cart-bar").classList.toggle("show", cart.length > 0);
    document.getElementById("cart-total-val").textContent = `${total.toFixed(2)} €`;
}

async function handleUpload(input) {
    const file = input.files[0];
    if(!file) return;
    document.getElementById("up-status").textContent = "CHARGEMENT EN COURS...";
    
    const fd = new FormData();
    fd.append("image", file);
    
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
    const data = await res.json();
    
    if(data.success) {
        document.getElementById("a-img").value = data.data.url;
        document.getElementById("up-status").textContent = "PHOTO OK ✓";
        tg.HapticFeedback.notificationOccurred('success');
    }
}

async function saveProduct() {
    const name = document.getElementById("a-name").value;
    const price = document.getElementById("a-price").value;
    const img = document.getElementById("a-img").value;
    const cat = document.getElementById("a-cat").value;

    if(!name || !price || !img) return alert("Veuillez remplir tous les champs et la photo !");

    await fetch(`${SUPA}/rest/v1/products`, {
        method: "POST",
        headers: { 
            "apikey": SUPA_KEY, 
            "Authorization": `Bearer ${SUPA_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
        },
        body: JSON.stringify({ name, price: parseFloat(price), image_url: img, category: cat })
    });

    showToast("ARTICLE PUBLIÉ ✓");
    setTimeout(() => location.reload(), 1000);
}

function sendOrder() {
    const lines = cart.map(i => `• ${i.name} (${i.size}) - ${i.price}€`).join("\n");
    const total = cart.reduce((acc, item) => acc + item.price, 0);
    const msg = `🛒 NOUVELLE COMMANDE - DRIP SOCIETY\n-------------------------\n${lines}\n-------------------------\nTOTAL : ${total.toFixed(2)}€`;
    tg.openTelegramLink(`https://t.me/fredpixou?text=${encodeURIComponent(msg)}`);
}

function tryAdmin() {
    const id = tg.initDataUnsafe?.user?.id;
    if(ADMINS.includes(String(id)) || prompt("CODE ADMIN ?") === "dripsociety999") {
        document.getElementById("admin-dw").classList.add("show");
    }
}

function openCart() { document.getElementById("cart-dw").classList.add("show"); renderCartItems(); }
function closeAll() { document.querySelectorAll(".dw").forEach(d => d.classList.remove("show")); }

function renderCartItems() {
    document.getElementById("cart-items").innerHTML = cart.map((i, index) => `
        <div style="display:flex;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--border);align-items:center;">
            <div style="font-size:12px;text-transform:uppercase;font-weight:700;">${i.name} <br><span style="color:var(--gray);font-weight:400;font-size:10px;">Taille: ${i.size}</span></div>
            <div style="color:var(--gold);font-weight:900;">${i.price.toFixed(2)}€</div>
        </div>
    `).join("");
}

function showToast(m) {
    const t = document.getElementById("toast");
    t.textContent = m; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2500);
}

load();
</script>
</body>
</html>
