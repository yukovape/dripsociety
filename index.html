<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Drip Society</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root {
  --black: #000; --white: #fff; --gray: #666; --gray-light: #999;
  --border: #1a1a1a; --border-light: #2a2a2a;
  --s1: #0a0a0a; --s2: #111; --s3: #161616;
  --gold: #c9a84c; --gold-dim: rgba(201,168,76,0.15); --gold-glow: rgba(201,168,76,0.4);
  --danger: #ff3b30; --success: #34c759;
  --font-h: 'Montserrat', sans-serif;
  --font-display: 'Bebas Neue', sans-serif;
  --font-serif: 'Cormorant Garamond', serif;
  --radius: 12px; --radius-sm: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--black); color: var(--white); font-family: var(--font-h); font-size: 14px; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

/* ══════════════════════════════════════
   SPLASH SCREEN
   ══════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; background: var(--black); z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), visibility 0.8s;
}
#splash.hidden-splash { opacity: 0; visibility: hidden; pointer-events: none; }

#splash .logo-container {
  position: relative; width: 140px; height: 140px; margin-bottom: 30px;
}
#splash .logo-ring {
  position: absolute; inset: -10px; border: 1px solid var(--gold);
  border-radius: 50%; animation: ringPulse 2s infinite ease-in-out;
}
#splash .logo-ring::after {
  content: ''; position: absolute; inset: -6px; border: 1px solid rgba(201,168,76,0.2);
  border-radius: 50%;
}
#splash img {
  width: 140px; height: 140px; border-radius: 50%; object-fit: cover;
  animation: logoFloat 3s infinite ease-in-out;
  box-shadow: 0 0 60px rgba(201,168,76,0.2), 0 0 120px rgba(201,168,76,0.05);
}
#splash .brand-text {
  font-family: var(--font-display); font-size: 28px; letter-spacing: 12px;
  color: var(--white); margin-bottom: 8px; text-transform: uppercase;
}
#splash .brand-sub {
  font-size: 10px; letter-spacing: 6px; color: var(--gray); text-transform: uppercase; margin-bottom: 40px;
}
.loader-bar { width: 80px; height: 1px; background: var(--border); position: relative; overflow: hidden; border-radius: 1px; }
.loader-progress { position: absolute; height: 100%; width: 40%; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: loadAnim 1.2s infinite linear; }

@keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes ringPulse { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.05); opacity: 1; } }
@keyframes loadAnim { from { left: -40%; } to { left: 100%; } }

/* ══════════════════════════════════════
   HEADER
   ══════════════════════════════════════ */
#header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 56px; background: rgba(0,0,0,0.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: var(--font-display); font-size: 22px; letter-spacing: 6px; }
.logo span { color: var(--gold); }
.hr { display: flex; gap: 8px; align-items: center; }
.ibtn {
  width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: none; cursor: pointer; transition: all 0.3s;
}
.ibtn:active { transform: scale(0.92); border-color: var(--gold); }
.ibtn svg { width: 18px; height: 18px; }
#cbadge {
  position: absolute; top: -4px; right: -4px;
  background: var(--gold); color: var(--black); font-size: 9px; font-weight: 900;
  width: 18px; height: 18px; border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  border: 2px solid var(--black);
}

/* VIP Badge */
.vip-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, var(--gold), #e8d48b);
  color: var(--black); font-size: 8px; font-weight: 900;
  padding: 3px 8px; border-radius: 20px; letter-spacing: 1px;
  text-transform: uppercase;
}

/* ══════════════════════════════════════
   SEARCH BAR
   ══════════════════════════════════════ */
#search-section {
  padding: 16px 20px 0; background: var(--black);
}
#search-bar {
  width: 100%; padding: 12px 16px 12px 40px;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--white);
  font-family: var(--font-h); font-size: 13px; outline: none;
  transition: border-color 0.3s;
}
#search-bar:focus { border-color: var(--gold); }
#search-bar::placeholder { color: var(--gray); }
.search-wrap {
  position: relative;
}
.search-wrap svg {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; stroke: var(--gray); pointer-events: none;
}

/* ══════════════════════════════════════
   HERO
   ══════════════════════════════════════ */
#hero {
  padding: 40px 20px 30px; border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #030303, var(--black));
  position: relative; overflow: hidden;
}
#hero::after {
  content: ''; position: absolute; top: -50%; right: -30%;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.04), transparent 70%);
}
#hero h1 {
  font-family: var(--font-display); font-size: 48px;
  line-height: 0.95; text-transform: uppercase; margin-bottom: 12px;
  letter-spacing: 2px;
}
#hero h1 em {
  font-family: var(--font-serif); font-style: italic;
  color: var(--gold); font-size: 52px; font-weight: 300; letter-spacing: 0;
}
#hero p { font-size: 11px; color: var(--gray); letter-spacing: 3px; text-transform: uppercase; }
#vip-status { margin-top: 12px; }

/* ══════════════════════════════════════
   CATEGORY TABS
   ══════════════════════════════════════ */
#tabs-section {
  padding: 16px 0 0; background: var(--black);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; z-index: 90;
}
#tabs-wrap {
  display: flex; overflow-x: auto; gap: 0; padding: 0 20px;
  -ms-overflow-style: none; scrollbar-width: none;
}
#tabs-wrap::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0; padding: 10px 20px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px; color: var(--gray);
  background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: all 0.3s; white-space: nowrap;
}
.tab-btn.active { color: var(--white); border-bottom-color: var(--gold); }
.tab-btn:active { transform: scale(0.95); }

/* ══════════════════════════════════════
   CATALOG GRID
   ══════════════════════════════════════ */
#catalog {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 1px; background: var(--border); padding-bottom: 140px;
}
#no-results {
  grid-column: 1 / -1; padding: 60px 20px; text-align: center;
  color: var(--gray); font-size: 12px; letter-spacing: 2px;
  text-transform: uppercase; background: var(--black);
}

.card {
  background: var(--black); display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
.card-new::after {
  content: 'NEW'; position: absolute; top: 12px; left: 12px;
  background: var(--gold); color: var(--black); font-size: 8px; font-weight: 900;
  padding: 3px 8px; letter-spacing: 2px; z-index: 5; border-radius: 4px;
}

/* Image Slider */
.cimg {
  width: 100%; aspect-ratio: 1 / 1.25; background: var(--s2);
  overflow: hidden; position: relative;
}
.cimg-slider {
  display: flex; width: 100%; height: 100%;
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.cimg-slider img {
  min-width: 100%; height: 100%; object-fit: cover; object-position: center;
}
.slider-dots {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 5;
}
.slider-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.3); transition: all 0.3s; cursor: pointer;
}
.slider-dot.active { background: var(--gold); transform: scale(1.3); }

/* Stock badge */
.stock-badge {
  position: absolute; top: 10px; right: 10px; z-index: 5;
  font-size: 8px; font-weight: 700; padding: 3px 8px;
  border-radius: 4px; letter-spacing: 1px; text-transform: uppercase;
}
.stock-badge.low { background: rgba(255,59,48,0.9); color: white; }
.stock-badge.out { background: rgba(255,59,48,0.9); color: white; }

.cbody { padding: 14px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
.cname {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  margin-bottom: 6px; line-height: 1.4; letter-spacing: 0.5px;
}
.cprice {
  color: var(--gold); font-weight: 600; font-size: 20px;
  margin-bottom: 12px; font-family: var(--font-serif);
}

/* ══════════════════════════════════════
   SIZE SELECTOR (avec animation bounce)
   ══════════════════════════════════════ */
.sz-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.sz-btn {
  border: 1px solid var(--border); padding: 8px; font-size: 10px; font-weight: 700;
  cursor: pointer; color: var(--gray); background: var(--s1);
  min-width: 38px; text-align: center; border-radius: 6px;
  transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.sz-btn:active { transform: scale(0.9); }
.sz-btn.active {
  border-color: var(--gold); color: var(--gold); background: var(--gold-dim);
  animation: sizeBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes sizeBounce {
  0% { transform: scale(0.8); } 50% { transform: scale(1.15); } 100% { transform: scale(1); }
}

/* ══════════════════════════════════════
   ADD TO CART BUTTON (Glow effect)
   ══════════════════════════════════════ */
.add-btn {
  width: 100%; padding: 13px; border: none; font-weight: 900;
  font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
  border-radius: var(--radius-sm); cursor: pointer;
  transition: all 0.3s; position: relative; overflow: hidden;
}
.add-btn.ready {
  background: var(--gold); color: var(--black);
  box-shadow: 0 0 20px var(--gold-glow), 0 0 60px rgba(201,168,76,0.1);
}
.add-btn.ready:active { transform: scale(0.97); box-shadow: 0 0 30px var(--gold-glow); }
.add-btn:disabled {
  background: var(--s1); color: var(--border); cursor: not-allowed;
  border: 1px solid var(--border);
}

/* Ripple effect */
.ripple {
  position: absolute; border-radius: 50%; background: rgba(255,255,255,0.3);
  transform: scale(0); animation: rippleAnim 0.6s linear;
  pointer-events: none;
}
@keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

/* ══════════════════════════════════════
   CART BAR (Bottom)
   ══════════════════════════════════════ */
#cart-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border); padding: 16px 20px;
  transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#cart-bar.show { transform: translateY(0); }
#bar-btn {
  width: 100%; padding: 16px 20px; background: var(--gold); color: var(--black);
  font-weight: 900; text-transform: uppercase; border: none;
  display: flex; justify-content: space-between; align-items: center;
  border-radius: var(--radius); font-size: 12px; letter-spacing: 1px;
  box-shadow: 0 0 30px var(--gold-glow);
  transition: all 0.3s;
}
#bar-btn:active { transform: scale(0.98); }

/* ══════════════════════════════════════
   DRAWERS (Cart + Admin)
   ══════════════════════════════════════ */
.dw {
  position: fixed; inset: 0; z-index: 200; display: flex;
  align-items: flex-end; opacity: 0; visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
}
.dw.show { opacity: 1; visibility: visible; }
.dw-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.dw-content {
  position: relative; width: 100%; background: #050505;
  border-top: 1px solid rgba(201,168,76,0.3);
  padding: 30px 20px; border-radius: 24px 24px 0 0;
  max-height: 92vh; overflow-y: auto;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
}
.dw.show .dw-content { transform: translateY(0); }
.dw-handle {
  width: 40px; height: 4px; background: var(--border-light); border-radius: 2px;
  margin: 0 auto 20px;
}
.dw-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
}
.dw-title {
  text-transform: uppercase; letter-spacing: 3px; font-size: 16px; font-weight: 900;
}
.dw-close {
  color: var(--gray); font-size: 10px; cursor: pointer; letter-spacing: 2px;
  text-transform: uppercase; padding: 8px;
}

/* Cart Items */
.cart-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 0; border-bottom: 1px solid var(--border);
  animation: fadeSlideIn 0.3s ease;
}
@keyframes fadeSlideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

.cart-item-info { display: flex; flex-direction: column; gap: 6px; }
.cart-item-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.cart-item-size { font-size: 10px; color: var(--gray); letter-spacing: 1px; }
.btn-rm-cart {
  color: var(--danger); font-size: 9px; font-weight: 700; cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px; padding: 4px 0;
}
.cart-item-price {
  color: var(--gold); font-weight: 600; font-family: var(--font-serif); font-size: 18px;
}

.cart-footer {
  margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px;
}
.cart-total-row {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
}
.cart-total-label { font-size: 10px; color: var(--gray); letter-spacing: 2px; text-transform: uppercase; }
.cart-total-val { color: var(--gold); font-weight: 600; font-size: 28px; font-family: var(--font-serif); }

.btn-order {
  width: 100%; padding: 18px; background: var(--gold); border: none;
  font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
  border-radius: var(--radius); font-size: 12px; color: var(--black);
  box-shadow: 0 0 30px var(--gold-glow);
  transition: all 0.3s; cursor: pointer;
}
.btn-order:active { transform: scale(0.98); }

/* ══════════════════════════════════════
   ADMIN PANEL
   ══════════════════════════════════════ */
.admin-tabs {
  display: flex; gap: 0; margin-bottom: 25px; border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.admin-tab {
  flex: 1; padding: 12px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; text-align: center;
  background: var(--s1); color: var(--gray); border: none; cursor: pointer;
  transition: all 0.3s;
}
.admin-tab.active { background: var(--gold); color: var(--black); }

.admin-section { display: none; }
.admin-section.active { display: block; }

.fg { margin-bottom: 18px; }
.admin-row-2 { display: flex; gap: 12px; }
.admin-row-2 .fg { flex: 1; }
.fg label {
  display: block; font-size: 10px; text-transform: uppercase;
  margin-bottom: 8px; color: var(--gray); letter-spacing: 1px; font-weight: 600;
}
.fg input, .fg select {
  width: 100%; padding: 14px 16px; background: var(--s1);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--white); outline: none; font-family: var(--font-h);
  font-size: 13px; transition: border-color 0.3s;
}
.fg input:focus, .fg select:focus { border-color: var(--gold); }
.fg select option { background: var(--s1); }

/* Multi Upload */
.upload-grid { display: flex; gap: 10px; margin-bottom: 15px; }
.upload-slot {
  flex: 1; aspect-ratio: 1; border: 1px dashed var(--border);
  border-radius: var(--radius-sm); display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.3s; overflow: hidden; position: relative;
  background: var(--s1);
}
.upload-slot:hover, .upload-slot.active { border-color: var(--gold); }
.upload-slot .icon { font-size: 20px; margin-bottom: 4px; }
.upload-slot .label { font-size: 8px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }
.upload-slot img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.upload-slot .remove-img {
  position: absolute; top: 4px; right: 4px; background: var(--danger);
  color: white; width: 18px; height: 18px; border-radius: 50%;
  font-size: 10px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 2;
}

.btn-primary {
  width: 100%; padding: 16px; border: none; font-weight: 900;
  text-transform: uppercase; letter-spacing: 2px; border-radius: var(--radius);
  font-size: 11px; cursor: pointer; transition: all 0.3s;
}
.btn-gold { background: var(--gold); color: var(--black); box-shadow: 0 0 20px var(--gold-glow); }
.btn-gold:active { transform: scale(0.98); }
.btn-white { background: var(--white); color: var(--black); }
.btn-white:active { transform: scale(0.98); }
.btn-outline {
  background: none; border: 1px solid var(--gold); color: var(--gold);
}

/* Admin Inventory */
.admin-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.admin-item-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.admin-item img {
  width: 44px; height: 55px; object-fit: cover; border-radius: 6px; flex-shrink: 0;
}
.admin-item-info { min-width: 0; }
.admin-item-name {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 120px;
}
.admin-item-meta { font-size: 10px; color: var(--gold); margin-top: 2px; }
.admin-item-stock { font-size: 9px; color: var(--gray); margin-top: 2px; }
.admin-actions { display: flex; gap: 6px; flex-shrink: 0; }

.btn-sm {
  padding: 7px 10px; font-size: 9px; font-weight: 700; border: none;
  text-transform: uppercase; cursor: pointer; border-radius: 6px;
  letter-spacing: 0.5px; transition: all 0.2s;
}
.btn-sm:active { transform: scale(0.92); }
.btn-stock { background: var(--s3); color: var(--gold); border: 1px solid var(--border); }
.btn-price { background: var(--s3); color: var(--white); border: 1px solid var(--border); }
.btn-del { background: rgba(255,59,48,0.1); color: var(--danger); border: 1px solid rgba(255,59,48,0.2); }

/* Category Manager */
.cat-manager { margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border); }
.cat-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
.cat-tag {
  display: flex; align-items: center; gap: 6px;
  background: var(--s1); border: 1px solid var(--border);
  padding: 8px 12px; border-radius: 20px; font-size: 10px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
}
.cat-tag .cat-remove {
  cursor: pointer; color: var(--danger); font-size: 12px; font-weight: 900;
}
.cat-add-row { display: flex; gap: 8px; }
.cat-add-row input {
  flex: 1; padding: 10px 14px; background: var(--s1);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--white); font-size: 12px; outline: none;
}
.cat-add-row button {
  padding: 10px 16px; background: var(--gold); color: var(--black);
  border: none; border-radius: var(--radius-sm); font-weight: 900;
  font-size: 11px; cursor: pointer;
}

/* ══════════════════════════════════════
   TOAST
   ══════════════════════════════════════ */
#toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: var(--gold); color: var(--black); padding: 12px 24px;
  font-weight: 900; font-size: 10px; z-index: 10000;
  text-transform: uppercase; letter-spacing: 2px;
  border-radius: 30px; opacity: 0; visibility: hidden;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 4px 20px var(--gold-glow);
}
#toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════ */
.empty-state {
  padding: 40px 20px; text-align: center; color: var(--gray);
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

@media (min-width: 400px) {
  #catalog { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const SUPA = "https://juescdtmfmiqyfqfrwnd.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZXNjZHRtZm1pcXlmcWZyd25kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTQ0OTQsImV4cCI6MjA5MDI3MDQ5NH0.E1SIYG7bEjnBoZhb72QMC-B94e6pl-sGvqsvYgJu3eY";
const IMGBB_KEY = "aa8867d9251f5b7d143686e13436c72d";
const ADMINS = ["8649556290", "1072084263", "8704291005"];
const BOT_TOKEN = ""; // Ajoute ton bot token pour les notifications admin

const tg = window.Telegram.WebApp;
tg.expand();
tg.setHeaderColor('#000000');
tg.setBackgroundColor('#000000');

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let products = [];
let categories = [];
let cart = [];
let selectedSizes = {};
let activeCategory = 'all';
let searchQuery = '';
let uploadImages = [null, null, null];
let currentUploadSlot = 0;
let isVIP = false;

// ══════════════════════════════════════
// SPLASH
// ══════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  init();
  setTimeout(() => {
    document.getElementById('splash').classList.add('hidden-splash');
  }, 2800);
});

async function init() {
  await Promise.all([loadCategories(), loadProducts()]);
  await checkVIP();
  render();
  renderAdminList();
  renderCategoryTabs();
  renderCatManager();
  populateCatSelect();
}

// ══════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════
const supaHeaders = {
  "apikey": SUPA_KEY,
  "Authorization": `Bearer ${SUPA_KEY}`
};

async function loadProducts() {
  try {
    const res = await fetch(`${SUPA}/rest/v1/products?select=*,categories(name)&order=created_at.desc`, {
      headers: supaHeaders
    });
    products = await res.json();
    if (!Array.isArray(products)) products = [];
  } catch (e) {
    console.error('Load products error:', e);
    products = [];
  }
}

async function loadCategories() {
  try {
    const res = await fetch(`${SUPA}/rest/v1/categories?select=*&order=sort_order.asc`, {
      headers: supaHeaders
    });
    categories = await res.json();
    if (!Array.isArray(categories)) categories = [];
  } catch (e) {
    console.error('Load categories error:', e);
    categories = [];
  }
}

async function checkVIP() {
  const userId = tg.initDataUnsafe?.user?.id;
  if (!userId) return;
  try {
    const res = await fetch(`${SUPA}/rest/v1/orders?telegram_user_id=eq.${userId}&select=id&limit=1`, {
      headers: supaHeaders
    });
    const data = await res.json();
    isVIP = Array.isArray(data) && data.length > 0;
    if (isVIP) {
      document.getElementById('vip-status').innerHTML = '<div class="vip-badge" style="margin-top:12px;">&#9733; Client VIP</div>';
      document.getElementById('vip-header').innerHTML = '<div class="vip-badge">VIP</div>';
    }
  } catch(e) {}
}

// ══════════════════════════════════════
// CATEGORY TABS
// ══════════════════════════════════════
function renderCategoryTabs() {
  const wrap = document.getElementById('tabs-wrap');
  let html = `<button class="tab-btn ${activeCategory === 'all' ? 'active' : ''}" onclick="setCategory('all')">Tout</button>`;
  categories.forEach(c => {
    html += `<button class="tab-btn ${activeCategory === c.id ? 'active' : ''}" onclick="setCategory('${c.id}')">${c.name}</button>`;
  });
  wrap.innerHTML = html;
}

function setCategory(catId) {
  activeCategory = catId;
  renderCategoryTabs();
  render();
  try { tg.HapticFeedback.selectionChanged(); } catch(e) {}
}

// ══════════════════════════════════════
// SEARCH
// ══════════════════════════════════════
function handleSearch(query) {
  searchQuery = query.toLowerCase().trim();
  render();
}

// ══════════════════════════════════════
// FILTERED PRODUCTS
// ══════════════════════════════════════
function getFilteredProducts() {
  let filtered = [...products];

  if (activeCategory !== 'all') {
    filtered = filtered.filter(p => p.category_id === activeCategory);
  }

  if (searchQuery) {
    filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery));
  }

  return filtered;
}

// ══════════════════════════════════════
// RENDER CATALOG
// ══════════════════════════════════════
function render() {
  const grid = document.getElementById("catalog");
  const filtered = getFilteredProducts();

  if (filtered.length === 0) {
    grid.innerHTML = `<div id="no-results">Aucun article trouve</div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const size = selectedSizes[p.id] || "";
    const images = getProductImages(p);
    const isNew = isProductNew(p);
    const stock = p.stock ?? 999;

    return `
    <div class="card ${isNew ? 'card-new' : ''}" id="card-${p.id}">
      <div class="cimg">
        ${stock <= 0 ? '<div class="stock-badge out">Rupture</div>' : stock <= 3 ? `<div class="stock-badge low">${stock} restant${stock > 1 ? 's' : ''}</div>` : ''}
        <div class="cimg-slider" id="slider-${p.id}" style="transform:translateX(0%)">
          ${images.map(img => `<img src="${img}" alt="${p.name}" loading="lazy">`).join('')}
        </div>
        ${images.length > 1 ? `
        <div class="slider-dots">
          ${images.map((_, i) => `<div class="slider-dot ${i === 0 ? 'active' : ''}" onclick="slideToImage('${p.id}', ${i}, ${images.length})"></div>`).join('')}
        </div>` : ''}
      </div>
      <div class="cbody">
        <div class="cname">${escapeHtml(p.name)}</div>
        <div class="cprice">${p.price.toFixed(2)} &euro;</div>
        <div class="sz-row">
          ${['S','M','L','XL'].map(s => `<div class="sz-btn ${size === s ? 'active' : ''}" onclick="selectSize('${p.id}', '${s}')">${s}</div>`).join('')}
        </div>
        <button class="add-btn ${size ? 'ready' : ''}" ${!size || stock <= 0 ? 'disabled' : ''} onclick="addToCart('${p.id}')">
          ${stock <= 0 ? 'Indisponible' : size ? 'Ajouter au panier' : 'Choisir une taille'}
        </button>
      </div>
    </div>`;
  }).join("");
}

function getProductImages(p) {
  if (p.images && Array.isArray(p.images) && p.images.length > 0) {
    return p.images.filter(Boolean);
  }
  if (p.image_url) return [p.image_url];
  return ['data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="%23111" width="200" height="200"/></svg>'];
}

function isProductNew(p) {
  if (!p.created_at) return false;
  const created = new Date(p.created_at);
  const now = new Date();
  return (now - created) < 7 * 24 * 60 * 60 * 1000;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ══════════════════════════════════════
// IMAGE SLIDER
// ══════════════════════════════════════
function slideToImage(pid, index, total) {
  const slider = document.getElementById(`slider-${pid}`);
  if (!slider) return;
  slider.style.transform = `translateX(-${index * 100}%)`;

  const card = document.getElementById(`card-${pid}`);
  if (!card) return;
  card.querySelectorAll('.slider-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === index);
  });
}

// Touch swipe for slider
document.addEventListener('touchstart', handleTouchStart, { passive: true });
document.addEventListener('touchend', handleTouchEnd, { passive: true });

let touchStartX = 0;
let touchStartCard = null;

function handleTouchStart(e) {
  const slider = e.target.closest('.cimg');
  if (!slider) return;
  touchStartX = e.touches[0].clientX;
  touchStartCard = slider.closest('.card');
}

function handleTouchEnd(e) {
  if (!touchStartCard) return;
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) < 40) return;

  const pid = touchStartCard.id.replace('card-', '');
  const dots = touchStartCard.querySelectorAll('.slider-dot');
  if (dots.length <= 1) return;

  let currentIndex = 0;
  dots.forEach((dot, i) => { if (dot.classList.contains('active')) currentIndex = i; });

  const newIndex = diff > 0
    ? Math.min(currentIndex + 1, dots.length - 1)
    : Math.max(currentIndex - 1, 0);

  slideToImage(pid, newIndex, dots.length);
  touchStartCard = null;
}

// ══════════════════════════════════════
// SIZE SELECTION
// ══════════════════════════════════════
function selectSize(pid, size) {
  selectedSizes[pid] = size;
  render();
  try { tg.HapticFeedback.selectionChanged(); } catch(e) {}
}

// ══════════════════════════════════════
// CART
// ══════════════════════════════════════
function addToCart(pid) {
  const p = products.find(x => x.id == pid);
  if (!p || !selectedSizes[pid]) return;
  cart.push({ ...p, cartId: Date.now(), size: selectedSizes[pid] });
  updateCartUI();
  showToast("Ajoute au panier");
  try { tg.HapticFeedback.notificationOccurred('success'); } catch(e) {}
}

function removeFromCart(cartId) {
  cart = cart.filter(item => item.cartId !== cartId);
  updateCartUI();
  renderCartItems();
  try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}
}

function updateCartUI() {
  const total = cart.reduce((acc, item) => acc + item.price, 0);
  const badge = document.getElementById("cbadge");
  badge.textContent = cart.length;
  badge.style.display = cart.length > 0 ? "flex" : "none";
  document.getElementById("bar-qty").textContent = `${cart.length} ARTICLE${cart.length !== 1 ? 'S' : ''}`;
  document.getElementById("bar-total").textContent = `${total.toFixed(2)} \u20AC`;
  document.getElementById("cart-bar").classList.toggle("show", cart.length > 0);
  document.getElementById("cart-total-val").textContent = `${total.toFixed(2)} \u20AC`;
}

function renderCartItems() {
  const container = document.getElementById("cart-items");
  const emptyEl = document.getElementById("cart-empty");

  if (cart.length === 0) {
    container.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }

  emptyEl.style.display = 'none';
  container.innerHTML = cart.map(i => `
    <div class="cart-item">
      <div class="cart-item-info">
        <span class="cart-item-name">${escapeHtml(i.name)}</span>
        <span class="cart-item-size">Taille : ${i.size}</span>
        <span class="btn-rm-cart" onclick="removeFromCart(${i.cartId})">&#10005; Supprimer</span>
      </div>
      <span class="cart-item-price">${i.price.toFixed(2)}&euro;</span>
    </div>
  `).join("");
}

function openCart() {
  document.getElementById("cart-dw").classList.add("show");
  renderCartItems();
}

function closeAll() {
  document.querySelectorAll(".dw").forEach(d => d.classList.remove("show"));
}

// ══════════════════════════════════════
// ORDER
// ══════════════════════════════════════
async function sendOrder() {
  if (cart.length === 0) return;

  const lines = cart.map(i => `\u2022 ${i.name} (${i.size}) - ${i.price.toFixed(2)}\u20AC`).join("\n");
  const total = cart.reduce((acc, item) => acc + item.price, 0);
  const user = tg.initDataUnsafe?.user;
  const username = user?.username || user?.first_name || 'Client';

  // Save order to Supabase for VIP tracking
  try {
    await fetch(`${SUPA}/rest/v1/orders`, {
      method: "POST",
      headers: { ...supaHeaders, "Content-Type": "application/json", "Prefer": "return=minimal" },
      body: JSON.stringify({
        telegram_user_id: String(user?.id || ''),
        telegram_username: username,
        items: cart.map(i => ({ name: i.name, size: i.size, price: i.price })),
        total: total
      })
    });
  } catch(e) {
    console.error('Save order error:', e);
  }

  // Notify admin via bot (if token configured)
  if (BOT_TOKEN) {
    const notifMsg = `\uD83D\uDECD *NOUVELLE COMMANDE*\n\nClient: @${username}\n\n${lines}\n\n*TOTAL: ${total.toFixed(2)}\u20AC*`;
    for (const adminId of ADMINS) {
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: adminId,
            text: notifMsg,
            parse_mode: 'Markdown'
          })
        });
      } catch(e) {}
    }
  }

  // Send via Telegram DM
  const msg = `\uD83D\uDED2 NOUVELLE COMMANDE\n${'─'.repeat(25)}\n${lines}\n${'─'.repeat(25)}\nTOTAL : ${total.toFixed(2)}\u20AC`;
  tg.openTelegramLink(`https://t.me/fredpixou?text=${encodeURIComponent(msg)}`);
}

// ══════════════════════════════════════
// ADMIN
// ══════════════════════════════════════
function tryAdmin() {
  const id = tg.initDataUnsafe?.user?.id;
  if (ADMINS.includes(String(id)) || prompt("Code admin :") === "dripsociety999") {
    document.getElementById("admin-dw").classList.add("show");
    renderAdminList();
    renderCatManager();
    populateCatSelect();
  }
}

function switchAdminTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));

  if (tab === 'add') {
    document.querySelector('.admin-tab:first-child').classList.add('active');
    document.getElementById('admin-add').classList.add('active');
  } else {
    document.querySelector('.admin-tab:last-child').classList.add('active');
    document.getElementById('admin-manage').classList.add('active');
  }
}

// ── MULTI-IMAGE UPLOAD ──
function triggerUpload(slot) {
  currentUploadSlot = slot;
  document.getElementById('file-upload').click();
}

async function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;

  const slot = document.getElementById(`slot-${currentUploadSlot}`);
  slot.innerHTML = '<span class="label" style="color:var(--gold)">Upload...</span>';

  const fd = new FormData();
  fd.append("image", file);

  try {
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
    const data = await res.json();

    if (data.success) {
      uploadImages[currentUploadSlot] = data.data.url;
      slot.innerHTML = `
        <img src="${data.data.url}" alt="Photo ${currentUploadSlot + 1}">
        <div class="remove-img" onclick="event.stopPropagation(); removeUploadImage(${currentUploadSlot})">&#10005;</div>
      `;
      slot.classList.add('active');
      showToast("Photo ajoutee");
    } else {
      resetSlot(currentUploadSlot);
      showToast("Erreur upload");
    }
  } catch(e) {
    resetSlot(currentUploadSlot);
    showToast("Erreur upload");
  }

  input.value = '';
}

function removeUploadImage(slot) {
  uploadImages[slot] = null;
  resetSlot(slot);
}

function resetSlot(slot) {
  const el = document.getElementById(`slot-${slot}`);
  el.innerHTML = `<span class="icon">+</span><span class="label">Photo ${slot + 1}</span>`;
  el.classList.remove('active');
}

// ── SAVE PRODUCT ──
async function saveProduct() {
  const name = document.getElementById("a-name").value.trim();
  const priceRaw = document.getElementById("a-price").value.replace(',', '.');
  const price = parseFloat(priceRaw);
  const stock = parseInt(document.getElementById("a-stock").value) || 0;
  const catId = document.getElementById("a-cat").value;
  const images = uploadImages.filter(Boolean);

  if (!name) { showToast("Ajoute un nom d'article"); return; }
  if (isNaN(price) || price <= 0) { showToast("Ajoute un prix valide"); return; }
  if (images.length === 0) { showToast("Ajoute au moins une photo"); return; }

  const body = {
    name,
    price,
    stock,
    image_url: images[0],
    images: images,
    category_id: catId || null
  };

  try {
    await fetch(`${SUPA}/rest/v1/products`, {
      method: "POST",
      headers: { ...supaHeaders, "Content-Type": "application/json", "Prefer": "return=minimal" },
      body: JSON.stringify(body)
    });

    showToast("Article publie !");

    // Reset form
    document.getElementById("a-name").value = '';
    document.getElementById("a-price").value = '';
    document.getElementById("a-stock").value = '10';
    uploadImages = [null, null, null];
    [0, 1, 2].forEach(resetSlot);

    await loadProducts();
    render();
    renderAdminList();
  } catch(e) {
    showToast("Erreur de publication");
  }
}

// ── ADMIN INVENTORY ──
function renderAdminList() {
  const el = document.getElementById("admin-list");
  if (!el) return;

  if (products.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">&#128230;</div><p>Aucun article</p></div>';
    return;
  }

  el.innerHTML = products.map(p => {
    const catName = p.categories?.name || 'Sans cat.';
    const images = getProductImages(p);
    const stock = p.stock ?? '?';

    return `
    <div class="admin-item">
      <div class="admin-item-left">
        <img src="${images[0]}" alt="${escapeHtml(p.name)}">
        <div class="admin-item-info">
          <div class="admin-item-name">${escapeHtml(p.name)}</div>
          <div class="admin-item-meta">${p.price.toFixed(2)}&euro; &middot; ${catName}</div>
          <div class="admin-item-stock">Stock: ${stock}</div>
        </div>
      </div>
      <div class="admin-actions">
        <button class="btn-sm btn-stock" onclick="editStock('${p.id}', ${p.stock || 0})">&#128230;</button>
        <button class="btn-sm btn-price" onclick="editPrice('${p.id}', ${p.price})">&#128181;</button>
        <button class="btn-sm btn-del" onclick="deleteProduct('${p.id}')">&#128465;</button>
      </div>
    </div>`;
  }).join("");
}

async function editStock(id, current) {
  const val = prompt("Nouveau stock :", current);
  if (val === null || isNaN(val)) return;
  await fetch(`${SUPA}/rest/v1/products?id=eq.${id}`, {
    method: "PATCH",
    headers: { ...supaHeaders, "Content-Type": "application/json" },
    body: JSON.stringify({ stock: parseInt(val) })
  });
  showToast("Stock mis a jour");
  await loadProducts();
  render();
  renderAdminList();
}

async function editPrice(id, current) {
  const val = prompt("Nouveau prix :", current);
  if (val === null || isNaN(val)) return;
  await fetch(`${SUPA}/rest/v1/products?id=eq.${id}`, {
    method: "PATCH",
    headers: { ...supaHeaders, "Content-Type": "application/json" },
    body: JSON.stringify({ price: parseFloat(val) })
  });
  showToast("Prix mis a jour");
  await loadProducts();
  render();
  renderAdminList();
}

async function deleteProduct(id) {
  if (!confirm("Supprimer cet article ?")) return;
  await fetch(`${SUPA}/rest/v1/products?id=eq.${id}`, {
    method: "DELETE",
    headers: supaHeaders
  });
  showToast("Article supprime");
  await loadProducts();
  render();
  renderAdminList();
}

// ══════════════════════════════════════
// CATEGORY MANAGEMENT
// ══════════════════════════════════════
function renderCatManager() {
  const el = document.getElementById("cat-list");
  if (!el) return;
  el.innerHTML = categories.map(c => `
    <div class="cat-tag">
      ${escapeHtml(c.name)}
      <span class="cat-remove" onclick="deleteCategory('${c.id}')">&times;</span>
    </div>
  `).join("");
}

function populateCatSelect() {
  const sel = document.getElementById("a-cat");
  if (!sel) return;
  sel.innerHTML = '<option value="">-- Choisir --</option>' +
    categories.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join("");
}

async function addCategory() {
  const input = document.getElementById("new-cat-name");
  const name = input.value.trim();
  if (!name) return;

  try {
    await fetch(`${SUPA}/rest/v1/categories`, {
      method: "POST",
      headers: { ...supaHeaders, "Content-Type": "application/json", "Prefer": "return=minimal" },
      body: JSON.stringify({ name, sort_order: categories.length + 1 })
    });
    input.value = '';
    showToast("Categorie ajoutee");
    await loadCategories();
    renderCategoryTabs();
    renderCatManager();
    populateCatSelect();
  } catch(e) {
    showToast("Erreur");
  }
}

async function deleteCategory(id) {
  if (!confirm("Supprimer cette categorie ?")) return;
  await fetch(`${SUPA}/rest/v1/categories?id=eq.${id}`, {
    method: "DELETE",
    headers: supaHeaders
  });
  await loadCategories();
  renderCategoryTabs();
  renderCatManager();
  populateCatSelect();
  showToast("Categorie supprimee");
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
