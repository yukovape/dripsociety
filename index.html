<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Drip Society</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#000;--white:#fff;--gray:#888;--border:#1a1a1a;
  --s1:#0d0d0d;--s2:#111;--gold:#c9a84c;--danger:#ff3b30;
  --font-h:'Montserrat',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--black);color:var(--white);font-family:var(--font-h);font-size:14px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* ── SPLASH SCREEN ── */
#splash {
  position: fixed; inset: 0; background: var(--black); z-index: 1000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.5s ease;
}
#splash img { width: 160px; height: 160px; margin-bottom: 20px; border-radius: 50%; box-shadow: 0 0 20px rgba(201,168,76,0.2); }
.hidden-splash { opacity: 0; pointer-events: none; }

/* ── HEADER ── */
#header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:60px;background:var(--black);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-size:16px;font-weight:900;letter-spacing:4px;text-transform:uppercase;}
.hr{display:flex;gap:12px;}
.ibtn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:none;cursor:pointer;}
#cbadge{position:absolute;top:-5px;right:-5px;background:var(--gold);color:var(--black);font-size:9px;font-weight:900;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;}

/* ── CATALOG ── */
#catalog{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);padding-bottom:120px;}
.card{background:var(--black);display:flex;flex-direction:column;position:relative;}
.cimg{width:100%; aspect-ratio:1 / 1.2; background:var(--s2); overflow:hidden;}
.cimg img{width:100%; height:100%; object-fit:cover; display:block;}
.cbody{padding:12px;flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.cname{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px;min-height:30px;}
.cprice{color:var(--gold);font-weight:700;font-size:17px;font-family:'Cormorant Garamond',serif;}

/* ── TAILLES ── */
.sz-row{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
.sz-btn{ border:1px solid var(--border);padding:6px;font-size:10px;font-weight:700; cursor:pointer;color:var(--gray);background:var(--s1);min-width:35px;text-align:center;touch-action:manipulation;}
.sz-btn.active{border-color:var(--white);color:var(--white);background:var(--s2);}
.add-btn{ width:100%;padding:12px;margin-top:10px;background:var(--white);color:var(--black); border:none;font-weight:900;font-size:10px;text-transform:uppercase;touch-action:manipulation;}
.add-btn:disabled{background:var(--s1);color:var(--border);opacity:0.5;}

/* ── PANIER BARRE BAS ── */
#cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--black);border-top:1px solid var(--border);padding:15px;z-index:90;transform:translateY(100%);transition:0.3s;}
#cart-bar.show{transform:translateY(0);}
#bar-btn{width:100%;padding:14px;background:var(--gold);color:var(--black);font-weight:900;border:none;display:flex;justify-content:space-between;cursor:pointer;}

/* ── DRAWERS ── */
.dw{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;display:none;padding:20px;overflow-y:auto;}
.dw.show{display:block;}
.admin-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.fg{margin-bottom:15px;}
.fg input{width:100%;padding:12px;background:var(--s1);border:1px solid var(--border);color:var(--white);outline:none;}
.upload-box{border:1px dashed var(--gold);padding:20px;text-align:center;margin-bottom:10px;cursor:pointer;font-size:11px;font-weight:700;}
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--black);padding:10px 20px;font-weight:900;font-size:11px;z-index:1000;display:none;}
</style>
</head>
<body>

<div id="splash">
  <img src="https://i.ibb.co/XkyV7PzB/Gemini-Generated-Image-f1kqnhf1kqnhf1kq.jpg" alt="Logo">
  <p style="font-size:10px; letter-spacing:3px; color:var(--gray);">CHARGEMENT...</p>
</div>

<div id="toast"></div>

<header id="header">
  <div class="logo">DRIP<span>·</span>SOCIETY</div>
  <div class="hr">
    <div class="ibtn" onclick="tryAdmin()">⚙️</div>
    <div class="ibtn" onclick="openCart()" style="position:relative;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
        <div id="cbadge">0</div>
    </div>
  </div>
</header>

<div id="catalog"></div>

<div id="cart-bar">
  <button id="bar-btn" onclick="openCart()">
    <span id="bar-qty">0 ARTICLES</span>
    <span id="bar-total">0.00 €</span>
  </button>
</div>

<div id="cart-dw" class="dw">
  <h2 style="text-transform:uppercase;margin-bottom:20px;">Mon Panier</h2>
  <div id="cart-items"></div>
  <div style="border-top:1px solid var(--border);padding-top:15px;margin-top:20px;">
    <p id="total-cart-val" style="font-size:20px;font-weight:900;color:var(--gold);margin-bottom:15px;">0.00 €</p>
    <button onclick="sendOrder()" style="width:100%;padding:15px;background:var(--gold);border:none;font-weight:900;">COMMANDER SUR TELEGRAM</button>
    <button onclick="closeAll()" style="width:100%;margin-top:10px;background:none;color:var(--gray);border:none;">RETOUR</button>
  </div>
</div>

<div id="admin-dw" class="dw">
  <h2 style="text-transform:uppercase;margin-bottom:20px;">Gestion</h2>
  <div class="fg">
    <div class="upload-box" onclick="document.getElementById('file-input').click()">
        <span id="up-status">📸 CLIQUE ICI POUR LA PHOTO</span>
        <input type="file" id="file-input" style="display:none;" onchange="handleUpload(this)">
    </div>
    <input type="hidden" id="a-img">
  </div>
  <div class="fg"><input type="text" id="a-name" placeholder="Nom"></div>
  <div class="fg"><input type="number" id="a-price" placeholder="Prix (€)"></div>
  <button onclick="saveProduct()" style="width:100%;padding:15px;background:var(--white);color:var(--black);font-weight:900;border:none;">PUBLIER</button>
  <hr style="margin:20px 0; border-color:var(--border);">
  <div id="admin-list"></div>
  <button onclick="closeAll()" style="width:100%;margin-top:10px;background:none;color:var(--gray);border:none;">ANNULER</button>
</div>

<script>
const SUPA = "https://juescdtmfmiqyfqfrwnd.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZXNjZHRtZm1pcXlmcWZyd25kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTQ0OTQsImV4cCI6MjA5MDI3MDQ5NH0.E1SIYG7bEjnBoZhb72QMC-B94e6pl-sGvqsvYgJu3eY";
const IMGBB_KEY = "aa8867d9251f5b7d143686e13436c72d";
const ADMINS = ["8649556290", "1072084263", "8704291005"];

const tg = window.Telegram.WebApp;
tg.expand();

let products = [];
let cart = [];
let selectedSizes = {};

window.onload = () => {
    setTimeout(() => document.getElementById('splash').classList.add('hidden-splash'), 2500);
    load();
};

async function load() {
    const res = await fetch(`${SUPA}/rest/v1/products?select=*&order=created_at.desc`, {
        headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
    });
    products = await res.json();
    render();
    renderAdminList();
}

function render() {
    const grid = document.getElementById("catalog");
    grid.innerHTML = products.map(p => {
        const size = selectedSizes[p.id] || "";
        return `
        <div class="card">
            <div class="cimg"><img src="${p.image_url}"></div>
            <div class="cbody">
                <div class="cname">${p.name}</div>
                <div class="cprice">${parseFloat(p.price).toFixed(2)} €</div>
                <div class="sz-row">
                    ${['S','M','L','XL'].map(s => `<div class="sz-btn ${size===s?'active':''}" onclick="selectSize('${p.id}','${s}')">${s}</div>`).join('')}
                </div>
                <button class="add-btn" ${!size?'disabled':''} onclick="addToCart('${p.id}')">${size?'Ajouter':'Taille'}</button>
            </div>
        </div>`;
    }).join("");
}

function selectSize(pid, size) { selectedSizes[pid] = size; render(); }

function addToCart(pid) {
    const p = products.find(x => x.id == pid);
    cart.push({ ...p, size: selectedSizes[pid], cartId: Date.now() });
    updateUI();
    showToast("AJOUTÉ ✓");
}

function updateUI() {
    const total = cart.reduce((acc, item) => acc + parseFloat(item.price), 0);
    document.getElementById("cbadge").textContent = cart.length;
    document.getElementById("cbadge").style.display = cart.length > 0 ? "flex" : "none";
    document.getElementById("bar-qty").textContent = `${cart.length} ARTICLES`;
    document.getElementById("bar-total").textContent = `${total.toFixed(2)} €`;
    document.getElementById("cart-bar").classList.toggle("show", cart.length > 0);
    document.getElementById("total-cart-val").textContent = `${total.toFixed(2)} €`;
}

async function handleUpload(input) {
    const file = input.files[0]; if(!file) return;
    document.getElementById("up-status").textContent = "CHARGEMENT...";
    const fd = new FormData(); fd.append("image", file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
    const data = await res.json();
    if(data.success) {
        document.getElementById("a-img").value = data.data.url;
        document.getElementById("up-status").textContent = "PHOTO OK ✓";
    }
}

async function saveProduct() {
    const name = document.getElementById("a-name").value;
    const price = document.getElementById("a-price").value;
    const img = document.getElementById("a-img").value;
    if(!name || !price || !img) return alert("Remplis tout !");
    await fetch(`${SUPA}/rest/v1/products`, {
        method: "POST",
        headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({ name, price: parseFloat(price), image_url: img })
    });
    location.reload();
}

async function deleteProduct(id) {
    if(!confirm("Supprimer l'article ?")) return;
    await fetch(`${SUPA}/rest/v1/products?id=eq.${id}`, {
        method: "DELETE",
        headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
    });
    load();
}

function renderAdminList() {
    document.getElementById("admin-list").innerHTML = products.map(p => `
        <div class="admin-item">
            <span>${p.name}</span>
            <button onclick="deleteProduct('${p.id}')" style="color:var(--danger);background:none;border:none;font-weight:900;">SUPPR.</button>
        </div>`).join("");
}

function sendOrder() {
    const lines = cart.map(i => `• ${i.name} (${i.size}) - ${i.price}€`).join("\n");
    const total = cart.reduce((acc, item) => acc + parseFloat(item.price), 0);
    const msg = `🛒 NOUVELLE COMMANDE\n\n${lines}\n\nTOTAL : ${total.toFixed(2)}€`;
    tg.openTelegramLink(`https://t.me/fredpixou?text=${encodeURIComponent(msg)}`);
}

function tryAdmin() {
    if(ADMINS.includes(String(tg.initDataUnsafe?.user?.id)) || prompt("CODE ?") === "dripsociety999") {
        document.getElementById("admin-dw").classList.add("show");
    }
}

function openCart() { document.getElementById("cart-dw").classList.add("show"); renderCartItems(); }
function closeAll() { document.querySelectorAll(".dw").forEach(d => d.classList.remove("show")); }

function renderCartItems() {
    document.getElementById("cart-items").innerHTML = cart.map((i) => `
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
            <span>${i.name} (${i.size})</span>
            <span>${parseFloat(i.price).toFixed(2)}€</span>
        </div>`).join("");
}

function showToast(m) {
    const t = document.getElementById("toast");
    t.textContent = m; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2000);
}
</script>
</body>
</html>
