<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Drip Society</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root{
  --bg:       #FFFFFF;
  --bg2:      #F8F8F8;
  --bg3:      #F2F2F2;
  --wine:     #800020;
  --wine-d:   #5a0016;
  --wine-l:   rgba(128,0,32,0.08);
  --text-1:   #0A0A0A;
  --text-2:   #3A3A3A;
  --text-3:   #909090;
  --border:   rgba(0,0,0,0.07);
  --border2:  rgba(0,0,0,0.13);
  --glass-bg: rgba(255,255,255,0.82);
  --glass-border:rgba(255,255,255,0.6);
  --shadow-sm:0 2px 16px rgba(0,0,0,0.08);
  --shadow-md:0 6px 30px rgba(0,0,0,0.11);
  --r-sm:8px; --r-md:14px; --r-lg:20px; --r-xl:28px;
  --font-h:'Montserrat',sans-serif;
  --font-s:'Cormorant Garamond',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text-1);font-family:var(--font-h);font-size:14px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{display:none;}

/* ═══════════════════════════════════════
   SPLASH SCREEN (CHARGEMENT)
═══════════════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:#fff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity 0.8s ease, visibility 0.8s;
}
#splash.out{opacity:0;visibility:hidden;}
.splash-logo-wrap{
  width:150px;height:150px;border-radius:50%;
  overflow:hidden;position:relative;
  box-shadow:0 10px 40px rgba(128,0,32,0.2);
  border:2px solid var(--wine);
  animation: pulse 2s infinite ease-in-out;
}
#splash-logo{width:100%;height:100%;object-fit:cover;}
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

.loader-bar-wrap { width: 100px; height: 2px; background: var(--bg3); margin-top: 30px; position: relative; overflow: hidden; border-radius: 2px; }
#splash-prog { position: absolute; height: 100%; width: 0%; background: var(--wine); transition: width 0.4s; }

/* ═══════════════════════════════════════
   HEADER (LOGO HAUT DE PAGE)
═══════════════════════════════════════ */
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;height:65px;
  background:var(--glass-bg);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  position:sticky;top:0;z-index:100;
}
.header-logo-wrap { display: flex; align-items: center; gap: 12px; }
.header-logo-img { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--wine); object-fit: cover; }
.header-logo-text { font-weight: 900; letter-spacing: 3px; font-size: 14px; text-transform: uppercase; color: var(--wine); }

/* ═══════════════════════════════════════
   UI COMPONENTS (STABLES)
═══════════════════════════════════════ */
.ibtn{ width:40px;height:40px;border-radius:var(--r-sm); border:1px solid var(--border2); background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
#cbadge{ position:absolute;top:-5px;right:-5px;background:var(--wine);color:#fff;font-size:8px;font-weight:900;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;}

#hero{ padding:40px 20px; text-align:left; border-bottom:1px solid var(--border); }
.hero-h1{ font-size:38px; font-weight:900; line-height:0.9; text-transform:uppercase; margin-bottom:10px; }
.hero-h1 em{ font-family:var(--font-s); font-style:italic; color:var(--wine); font-size:42px; font-weight:400; }

#catalog{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:20px 14px;padding-bottom:150px;}
.card{background:var(--bg);border-radius:var(--r-md);box-shadow:var(--shadow-sm);overflow:hidden;position:relative;}

/* Slider logic */
.c-slider{position:relative;aspect-ratio:3/4;overflow:hidden;background:var(--bg3);}
.c-slides{display:flex;width:100%;height:100%;overflow-x:scroll;scroll-snap-type:x mandatory;scrollbar-width:none;}
.c-slides::-webkit-scrollbar{display:none;}
.c-slide{flex:0 0 100%;height:100%;scroll-snap-align:start;}
.c-slide img{width:100%;height:100%;object-fit:cover;}

.quick-add-btn{position:absolute;bottom:10px;right:10px;width:34px;height:34px;border-radius:50%;background:var(--wine);color:#fff;border:none;font-size:20px;box-shadow:0 4px 12px rgba(128,0,32,0.3);z-index:5;}

.cbody{padding:12px;display:flex;flex-direction:column;gap:5px;}
.cname{font-size:10px;font-weight:700;text-transform:uppercase;}
.cprice{color:var(--wine);font-weight:800;font-size:15px;}

/* ═══════════════════════════════════════
   DRAWERS (PANIER / ADMIN)
═══════════════════════════════════════ */
.dw{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;backdrop-filter:blur(10px);}
.dw.open{display:block;}
.dw-panel{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:25px 25px 0 0;padding:30px 20px;max-height:85vh;overflow-y:auto;}

#cart-bar{position:fixed;bottom:0;left:0;right:0;padding:20px;background:var(--glass-bg);backdrop-filter:blur(15px);border-top:1px solid var(--border);transform:translateY(100%);transition:0.4s;z-index:90;}
#cart-bar.up{transform:translateY(0);}
#bar-btn{width:100%;padding:16px;background:var(--wine);color:#fff;border:none;border-radius:var(--r-sm);font-weight:900;display:flex;justify-content:space-between;text-transform:uppercase;}

#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--wine);color:#fff;padding:10px 20px;border-radius:30px;font-weight:700;font-size:11px;z-index:1000;display:none;}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo-wrap">
    <img id="splash-logo" src="https://i.ibb.co/3mfQs8jQ/image-6.png" alt="Drip Society Logo">
  </div>
  <div class="loader-bar-wrap"><div id="splash-prog"></div></div>
</div>

<header id="header">
  <div class="header-logo-wrap">
    <img class="header-logo-img" src="https://i.ibb.co/3mfQs8jQ/image-6.png" alt="Logo">
    <div class="header-logo-text">DRIP<span>·</span>SOCIETY</div>
  </div>
  <div class="hbtns">
    <div class="ibtn" onclick="tryAdmin()">⚙️</div>
    <div class="ibtn" onclick="openCart()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
      <div id="cbadge">0</div>
    </div>
  </div>
</header>

<div id="app" style="opacity:0;">
  <div id="hero">
    <h1 class="hero-h1">Qualité <em>Supérieure</em><br>À Bas Prix</h1>
    <p style="font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:2px;">Streetwear & Lifestyle — Drip Society</p>
  </div>

  <div id="catalog"></div>
</div>

<div id="cart-bar">
  <button id="bar-btn" onclick="openCart()">
    <span id="bar-qty">0 ARTICLES</span>
    <span id="bar-total">0.00 €</span>
  </button>
</div>

<div id="cart-dw" class="dw">
  <div class="dw-panel">
    <h2 style="font-family:var(--font-s); font-size:28px; margin-bottom:20px; font-style:italic;">Votre Panier</h2>
    <div id="cart-items"></div>
    <div style="margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <span style="font-weight:700;">TOTAL</span>
            <span id="ctotal" style="color:var(--wine); font-weight:900; font-size:22px;">0.00 €</span>
        </div>
        <button onclick="sendOrder()" style="width:100%; padding:18px; background:var(--wine); color:#fff; border:none; border-radius:var(--r-sm); font-weight:900; text-transform:uppercase; letter-spacing:2px;">Finaliser sur Telegram</button>
        <button onclick="closeD('cart-dw')" style="width:100%; margin-top:15px; background:none; border:none; color:var(--text-3); font-size:11px; text-transform:uppercase;">Retour au shop</button>
    </div>
  </div>
</div>

<div id="admin-dw" class="dw">
    <div class="dw-panel">
      <h2 style="text-transform:uppercase; letter-spacing:2px; font-size:14px; margin-bottom:20px;">Gestion Admin</h2>
      <button onclick="closeD('admin-dw')" style="width:100%; padding:15px; background:var(--bg3); border:none; border-radius:8px; font-weight:700;">FERMER</button>
      <div id="admin-list" style="margin-top:20px;"></div>
    </div>
</div>

<div id="toast"></div>

<script>
const SUPA = "https://juescdtmfmiqyfqfrwnd.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1ZXNjZHRtZm1pcXlmcWZyd25kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2OTQ0OTQsImV4cCI6MjA5MDI3MDQ5NH0.E1SIYG7bEjnBoZhb72QMC-B94e6pl-sGvqsvYgJu3eY";
const BOT = "fredpixou";
const ADMINS = ["8649556290", "1072084263", "8704291005"];

const tg = window.Telegram.WebApp;
tg.expand();

let products = [];
let cart = [];

// CHARGEMENT INITIAL
window.onload = async () => {
  const prog = document.getElementById('splash-prog');
  prog.style.width = "40%";
  await loadProducts();
  prog.style.width = "100%";
  
  setTimeout(() => {
    document.getElementById('splash').classList.add('out');
    document.getElementById('app').style.opacity = "1";
  }, 1000);
};

async function loadProducts() {
    const res = await fetch(`${SUPA}/rest/v1/products?select=*&order=created_at.desc`, {
        headers: { "apikey": SUPA_KEY, "Authorization": `Bearer ${SUPA_KEY}` }
    });
    products = await res.json();
    renderCatalog();
}

function renderCatalog() {
    const grid = document.getElementById("catalog");
    grid.innerHTML = products.map(p => {
        return `
        <div class="card">
            <div class="c-slider">
                <div class="c-slides">
                    <div class="c-slide"><img src="${p.image_url}"></div>
                </div>
                <button class="quick-add-btn" onclick="addToCart('${p.id}')">+</button>
            </div>
            <div class="cbody">
                <div class="cname">${p.name}</div>
                <div class="cprice">${parseFloat(p.price).toFixed(2)} €</div>
            </div>
        </div>`;
    }).join("");
}

function addToCart(pid) {
    const p = products.find(x => x.id == pid);
    cart.push({ ...p, cartId: Date.now() });
    updateUI();
    showToast("AJOUTÉ ✓");
    tg.HapticFeedback.notificationOccurred('success');
}

function updateUI() {
    const total = cart.reduce((acc, item) => acc + parseFloat(item.price), 0);
    document.getElementById("cbadge").textContent = cart.length;
    document.getElementById("cbadge").style.display = cart.length > 0 ? "flex" : "none";
    document.getElementById("bar-qty").textContent = `${cart.length} ARTICLES`;
    document.getElementById("bar-total").textContent = `${total.toFixed(2)} €`;
    document.getElementById("cart-bar").classList.toggle("up", cart.length > 0);
    document.getElementById("ctotal").textContent = `${total.toFixed(2)} €`;
}

function sendOrder() {
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#800020', '#c9a84c', '#ffffff'] });
    
    const lines = cart.map(i => `• ${i.name} - ${i.price}€`).join("\n");
    const total = cart.reduce((acc, item) => acc + parseFloat(item.price), 0);
    const msg = `🛒 NOUVELLE COMMANDE\n-------------------------\n${lines}\n-------------------------\nTOTAL : ${total.toFixed(2)}€`;
    
    setTimeout(() => {
        tg.openTelegramLink(`https://t.me/${BOT}?text=${encodeURIComponent(msg)}`);
    }, 1500);
}

function tryAdmin() {
    const id = String(tg.initDataUnsafe?.user?.id);
    if(ADMINS.includes(id) || prompt("ACCÈS ADMIN ?") === "dripsociety999") {
        document.getElementById("admin-dw").classList.add("open");
    }
}

function openCart() { document.getElementById("cart-dw").classList.add("open"); renderCartItems(); }
function closeD(id) { document.getElementById(id).classList.remove("open"); }

function renderCartItems() {
    document.getElementById("cart-items").innerHTML = cart.map(i => `
        <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid var(--border);">
            <span style="font-size:12px; font-weight:700;">${i.name}</span>
            <span style="color:var(--wine); font-weight:900;">${parseFloat(i.price).toFixed(2)}€</span>
        </div>
    `).join("");
}

function showToast(m) {
    const t = document.getElementById("toast");
    t.innerText = m; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2000);
}
</script>
</body>
</html>
